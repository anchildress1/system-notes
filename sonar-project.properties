sonar.projectKey=anchildress1_system-notes
sonar.organization=anchildress1

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test files — Sonar treats these as test sources, not production code
sonar.test.inclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx

# Mirrors vitest coverage.exclude (vitest.config.ts): canvas/physics components,
# integration-heavy modules, and generated app routes covered by E2E instead of
# unit tests.
sonar.coverage.exclusions=\
  src/**/app/**,\
  src/components/AIChat/AIChat.tsx,\
  src/components/GlitterBomb/GlitterBomb.tsx,\
  src/components/SearchPage/SearchPage.tsx,\
  src/components/icons/index.ts,\
  src/hooks/useSparkles.ts
