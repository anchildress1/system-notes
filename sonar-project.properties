sonar.projectKey=anchildress1_system-notes
sonar.organization=anchildress1

sonar.python.version=3.12
sonar.sources=apps/web/src,apps/api
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/.next/**,**/coverage/**,**/htmlcov/**,**/__pycache__/**
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.python.coverage.reportPaths=apps/api/coverage.xml

# Test files — Sonar treats these as test sources, not production code
sonar.test.inclusions=\
  apps/web/src/**/*.test.ts,\
  apps/web/src/**/*.test.tsx

# Mirror vitest coverage.exclude — files intentionally untested
# (canvas/physics components, integration-heavy modules, generated app routes)
sonar.coverage.exclusions=\
  apps/web/src/**/app/**,\
  apps/web/src/components/AIChat/AIChat.tsx,\
  apps/web/src/components/GlitterBomb/GlitterBomb.tsx,\
  apps/web/src/components/SearchPage/SearchPage.tsx,\
  apps/web/src/components/icons/index.ts,\
  apps/web/src/lib/recommendations.ts,\
  apps/web/src/context/ChatContext.tsx,\
  apps/web/src/hooks/useSparkles.ts,\
  apps/web/src/utils/userToken.ts
