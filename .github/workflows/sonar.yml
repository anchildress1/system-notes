name: SonarCloud Analysis

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      NEXT_PUBLIC_ALGOLIA_APPLICATION_ID: 'test_app_id'
      NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY: 'test_search_key'
      NEXT_PUBLIC_ALGOLIA_AGENT_ID: 'mck_agent_id'
      NEXT_PUBLIC_ALGOLIA_SEARCH_INDEX_NAME: 'my-public-index'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required by SonarCloud for full blame/new-code analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Unit Tests (generate coverage)
        run: make test

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key -- false positive: this is a pinned GitHub Action commit SHA, not a secret
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
