name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-please:
    concurrency:
      group: ${{ github.workflow }}-release-please
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: ${{ github.workflow }}-deploy
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: deploy
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'anchildress1-unstable' }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-east1' }}
      NEXT_PUBLIC_ALGOLIA_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_APPLICATION_ID }}
      NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY: ${{ secrets.NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY }}
      NEXT_PUBLIC_ALGOLIA_AGENT_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_AGENT_ID }}
      NEXT_PUBLIC_ALGOLIA_SEARCH_AI_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_SEARCH_AI_ID }}
      NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_ALGOLIA_SEARCH_INDEX_NAME: ${{ vars.NEXT_PUBLIC_ALGOLIA_SEARCH_INDEX_NAME || 'system-notes' }}
      NEXT_PUBLIC_ALGOLIA_SUGGESTIONS_INDEX_NAME: ${{ vars.NEXT_PUBLIC_ALGOLIA_SUGGESTIONS_INDEX_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: 'beta'

      - name: Deploy to Cloud Run
        run: ./deploy.sh
