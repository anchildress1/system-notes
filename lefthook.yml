# lefthook.yml
pre-commit:
  parallel: false
  commands:
    format:
      run: make format
      stage_fixed: true
    lint:
      run: make lint
      stage_fixed: true
    scan-secrets:
      run: make secret-scan
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit

pre-push:
  parallel: false
  commands:
    unit-tests:
      run: make test
    security-scan:
      run: make secret-scan
    # Lighthouse gate: 95% floor on all categories (mobile + desktop). Builds the
    # app itself, so no separate build step is needed. Runs last — the cheap
    # checks above fail fast before this several-minute pass.
    performance:
      run: make test-perf
